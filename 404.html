<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端：设置视口宽度，保留用户缩放能力（更友好） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>页面不存在 - Leukeen</title>
    <style>
        /* 全局盒模型统一 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- 原有画风（完全保留）----- */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            padding: 4rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0 auto;
        }

        p {
            margin: 1.5rem auto;
            font-size: 1.1rem;
            color: #666;
        }

        .error-id {
            font-family: monospace, Consolas, 'Courier New', monospace;
            background: #f4f4f4;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            display: inline-block;
            margin-top: 1rem;
            color: #333;
        }

        /* ----- 响应式适配：画风不变，只为不同屏幕优化尺寸与可读性 ----- */
        /* 限制标题和段落的最大宽度，避免大屏幕下行过长 */
        h1, p {
            max-width: 600px;
        }

        /* 增强错误ID容器在小屏幕的适应性 */
        .error-id {
            max-width: 100%;
            word-break: break-word;
        }

        /* 中屏：平板或较小笔记本 */
        @media (max-width: 640px) {
            body {
                padding: 3rem 1rem;
            }
            h1 {
                font-size: 2.7rem;
            }
        }

        /* 小屏：大屏手机 */
        @media (max-width: 480px) {
            body {
                padding: 2rem 0.8rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .error-id {
                font-size: 0.85rem;
                padding: 0.4rem 0.8rem;
            }
            p {
                font-size: 1rem;
            }
        }

        /* 超小屏：紧凑型手机 (如 iPhone SE 320px) */
        @media (max-width: 360px) {
            h1 {
                font-size: 2rem;
            }
            .error-id {
                font-size: 0.75rem;
                padding: 0.3rem 0.6rem;
            }
        }

        /* 版权信息 */
        .copyright {
            font-size: 0.7rem;
            padding: 2rem 0.5rem 1rem;
            color: #999;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>抱歉，您访问的页面不存在。</p>
    <div class="error-id">
        错误代码: <span id="errId"></span>
    </div>
    <footer class="copyright">
        Copyright © 2025 Leukeen Inc. 保留所有权利。 | 冀ICP备13608号-1
    </footer>

    <script>
        // 1. URL 重定向逻辑优化：修复边界场景
        (function() {
            const path = window.location.pathname;
            // 排除根目录、已带 .html 后缀、以 / 结尾的路径
            const isRoot = path === '/';
            const hasHtmlExt = path.endsWith('.html');
            const endsWithSlash = path.endsWith('/') && path !== '/';
            
            if (!isRoot && !hasHtmlExt && !endsWithSlash) {
                const newPath = path + '.html';
                // 301 永久重定向（搜索引擎友好）
                window.location.replace(newPath);
            }
        })();

        // 2. 生成8位十六进制随机ID（增强鲁棒性）
        (function() {
            function generateRandomId() {
                let randomId = '';
                // 确保生成足够长度的随机字符串
                while (randomId.length < 8) {
                    randomId += Math.random().toString(16).substr(2);
                }
                // 截取前8位并转大写
                return randomId.substr(0, 8).toUpperCase();
            }
            const errId = 'ERR_' + generateRandomId();
            document.getElementById('errId').textContent = errId;
        })();
    </script>
</body>
</html>
